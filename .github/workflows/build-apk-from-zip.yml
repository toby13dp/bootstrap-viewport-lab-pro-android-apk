name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk-from-zip:
    name: Unzip project and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check ZIP exists
        run: |
          echo "Repository files:"
          ls -la

          if [ ! -f "bootstrap-viewport-lab-pro-android-apk-github-actions.zip" ]; then
            echo "❌ ZIP niet gevonden."
            echo "Upload dit bestand in de root van je repository:"
            echo "bootstrap-viewport-lab-pro-android-apk-github-actions.zip"
            exit 1
          fi

          echo "✅ ZIP gevonden."

      - name: Unzip Android project
        run: |
          rm -rf extracted
          mkdir extracted
          unzip -q bootstrap-viewport-lab-pro-android-apk-github-actions.zip -d extracted

          echo "Uitgepakte inhoud:"
          find extracted -maxdepth 4 -type f | head -100

      - name: Find Android project root
        id: project
        run: |
          SETTINGS_FILE=$(find extracted -name "settings.gradle" -o -name "settings.gradle.kts" | head -1)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "❌ Geen settings.gradle gevonden in de uitgepakte ZIP."
            echo "Controleer of de ZIP de Android-projectmap bevat."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")

          echo "✅ Android project gevonden in:"
          echo "$PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          gradle assembleDebug --no-daemon --stacktrace

      - name: Show APK files
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          echo "Gevonden APK-bestanden:"
          find app/build/outputs/apk -name "*.apk" -type f -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewportLabPro-debug-apk
          path: ${{ steps.project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
